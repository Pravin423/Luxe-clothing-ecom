{% extends 'base.html' %}
{% load static %}

{% block bodycontent %}
<div class="container my-5" style="min-height: 70vh; display: flex; align-items: center; justify-content: center;">
  <div class="card border-0 shadow-lg" style="max-width: 450px; width: 100%; border-radius: 0;">
    <div class="card-body p-5">
      <div class="text-center mb-4">
        <h2 class="fw-bold mb-2 gsap-login" style="font-family: 'Playfair Display', serif;">Welcome Back</h2>
        <p class="text-muted small text-uppercase" style="letter-spacing: 1px;">Sign in to your account</p>
      </div>

      {% if error_msg %}
      <div class="alert alert-danger p-3 mb-4 rounded-0" style="font-size: 0.9rem;" role="alert">
        <i class="bi bi-exclamation-triangle-fill me-2"></i>{{ error_msg }}
      </div>
      {% endif %}

      <form method="POST" class="gsap-login">
        {% csrf_token %}
        <div class="mb-4">
          <label for="username" class="form-label text-uppercase text-muted"
            style="font-size: 0.75rem; letter-spacing: 1px;">Username</label>
          <input type="text" class="form-control form-control-lg rounded-0 bg-light border-0 shadow-none px-3 py-3"
            id="username" name="username" placeholder="Enter your username" required>
        </div>

        <div class="mb-4">
          <label for="password" class="form-label text-uppercase text-muted"
            style="font-size: 0.75rem; letter-spacing: 1px;">Password</label>
          <input type="password" class="form-control form-control-lg rounded-0 bg-light border-0 shadow-none px-3 py-3"
            id="password" name="password" placeholder="Enter your password" required>
        </div>

        <div class="d-flex justify-content-end mb-4">
          <a href="#" class="text-muted text-decoration-none small" style="font-size: 0.8rem;">Forgot password?</a>
        </div>

        <button type="submit" class="btn btn-dark w-100 py-3 mb-4 rounded-0 text-uppercase"
          style="letter-spacing: 1px; font-size: 0.9rem; font-weight: 500;">Log In</button>
      </form>

      <div class="text-center mt-3 gsap-login">
        <p class="text-muted small mb-0">Don't have an account? <a href="/register"
            class="text-dark fw-bold text-decoration-none border-bottom border-dark pb-1 ms-1">Sign up</a></p>
      </div>
    </div>
  </div>
</div>

<script>
  document.addEventListener("DOMContentLoaded", () => {
    if (typeof gsap !== 'undefined') {
      gsap.from(".gsap-login", { duration: 0.8, y: 30, opacity: 0, stagger: 0.1, ease: "power3.out" });
    }
  });
</script>
{% endblock bodycontent %}
