<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>LUXE Admin Dashboard</title>
  <!-- Bootstrap & Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

  <!-- Clean Modern Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap"
    rel="stylesheet">

  <style>
    :root {
      --primary: #111111;
      --bg-color: #FAFAFA;
      --text-color: #222222;
    }

    body {
      margin: 0;
      font-family: 'Outfit', sans-serif;
      background-color: var(--bg-color);
      color: var(--text-color);
    }

    h1,
    h2,
    h3,
    h4,
    h5,
    h6 {
      font-family: 'Playfair Display', serif;
      font-weight: 600;
      letter-spacing: -0.02em;
    }

    .admin-navbar {
      background-color: #111;
    }

    .admin-navbar .navbar-brand {
      color: #fff !important;
      font-family: 'Playfair Display', serif;
      letter-spacing: 2px;
    }

    .admin-navbar .nav-link {
      color: #ddd !important;
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .admin-navbar .nav-link:hover,
    .admin-navbar .nav-link.active {
      color: #fff !important;
    }

    .admin-content {
      padding: 40px 0;
    }

    .btn-dark {
      background-color: var(--primary);
      border-color: var(--primary);
      border-radius: 0;
      text-transform: uppercase;
      letter-spacing: 1px;
      font-size: 0.85rem;
    }

    .form-control,
    .form-select {
      border-radius: 0;
      border: 1px solid #ddd;
      padding: 0.75rem 1rem;
      box-shadow: none !important;
    }

    .form-control:focus,
    .form-select:focus {
      border-color: var(--primary);
    }
  </style>
</head>

<body>

  <nav class="navbar navbar-expand-lg admin-navbar py-3">
    <div class="container-fluid px-4">
      <a class="navbar-brand d-flex align-items-center" href="/admin">
        <i class="bi bi-shop me-2"></i> LUXE. ADMIN
      </a>
      <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse"
        data-bs-target="#adminNavbarContent" style="filter: invert(1);">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse justify-content-end" id="adminNavbarContent">
        <ul class="navbar-nav gap-3 align-items-center">
          <li class="nav-item">
            <a class="nav-link" href="/admin/product/view"><i class="bi bi-box me-1"></i> Inventory</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="/admin/product/add"><i class="bi bi-plus-lg me-1"></i> Add Product</a>
          </li>
          <li class="nav-item ms-lg-3">
            <a class="nav-link text-danger fw-bold" href="/logout"><i class="bi bi-box-arrow-right me-1"></i> Logout</a>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <div class="admin-content">
    <div class="container-fluid px-4">
      {% block adminbodycontent %}
      {% endblock adminbodycontent %}
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
    crossorigin="anonymous"></script>
  <!-- GSAP for Admin Animations -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      gsap.from(".admin-content", { duration: 0.6, y: 20, opacity: 0, ease: "power2.out" });
    });
  </script>
</body>

</html>
