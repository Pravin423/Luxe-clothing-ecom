{% extends 'admin/admin.html' %}
{% block adminbodycontent %}

<div class="container my-4" style="max-width: 800px;">
  <div class="d-flex justify-content-between align-items-center mb-4 pb-3 border-bottom">
    <h2 class="mb-0">Update Product #{{product.id}}</h2>
    <a href="/admin/product/view" class="btn btn-outline-dark"><i class="bi bi-arrow-left me-2"></i>Back to
      Inventory</a>
  </div>

  <div class="card border-0 shadow-sm bg-white" style="border-radius: 8px;">
    <div class="card-body p-4 p-md-5">
      <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}

        {% if error_msg %}
        <div class="alert alert-danger p-3 mb-4 rounded-0" style="font-size: 0.9rem;" role="alert">
          <i class="bi bi-exclamation-triangle-fill me-2"></i>{{ error_msg }}
        </div>
        {% endif %}

        <div class="row g-4">
          <div class="col-md-6">
            <label for="name" class="form-label text-uppercase text-muted"
              style="font-size: 0.75rem; letter-spacing: 1px;">Product Name</label>
            <input type="text" class="form-control" id="name" name="name" value="{{ product.name }}" required>
          </div>

          <div class="col-md-6">
            <label for="price" class="form-label text-uppercase text-muted"
              style="font-size: 0.75rem; letter-spacing: 1px;">Price (&#8377;)</label>
            <input type="number" class="form-control" id="price" name="price" value="{{ product.price }}" required>
          </div>

          <div class="col-12">
            <label for="description" class="form-label text-uppercase text-muted"
              style="font-size: 0.75rem; letter-spacing: 1px;">Description</label>
            <textarea class="form-control" id="description" name="description" rows="3"
              required>{{ product.description }}</textarea>
          </div>

          <div class="col-md-6">
            <label for="category" class="form-label text-uppercase text-muted"
              style="font-size: 0.75rem; letter-spacing: 1px;">Category</label>
            <select class="form-select" name="category" id="category" required>
              <option value="cloth" {% if product.category=="cloth" %}selected{% endif %}>Dresses</option>
              <option value="tops" {% if product.category=="tops" %}selected{% endif %}>Tops</option>
              <option value="tank" {% if product.category=="tank" %}selected{% endif %}>Tank Tops</option>
              <option value="shirts" {% if product.category=="shirts" %}selected{% endif %}>Blouses & Shirts</option>
              <option value="bottoms" {% if product.category=="bottoms" %}selected{% endif %}>Bottoms</option>
              <option value="denim" {% if product.category=="denim" %}selected{% endif %}>Denim</option>
              <option value="shorts" {% if product.category=="shorts" %}selected{% endif %}>Shorts</option>
              <option value="joggers" {% if product.category=="joggers" %}selected{% endif %}>Joggers</option>
            </select>
          </div>

          <div class="col-md-6">
            <label for="quantity" class="form-label text-uppercase text-muted"
              style="font-size: 0.75rem; letter-spacing: 1px;">Stock Quantity</label>
            <input type="number" class="form-control" id="quantity" name="quantity" value="{{ product.quantity }}"
              required>
          </div>

          <div class="col-md-8">
            <label for="image" class="form-label text-uppercase text-muted"
              style="font-size: 0.75rem; letter-spacing: 1px;">Product Image Label (To Keep Existing, Just don't upload
              a new one)</label>
            <input type="file" class="form-control" id="image" name="image">
            {% if product.image %}
            <p class="mt-2 text-muted small">Current Image: <a
                href="http://127.0.0.1:8000/admin/product/media/{{ product.image }}" target="_blank">View</a></p>
            {% endif %}
          </div>

          <div class="col-md-4 d-flex align-items-center mb-2 mt-4 pt-2">
            <div class="form-check form-switch d-flex align-items-center mb-0">
              <input class="form-check-input mt-0 me-2" type="checkbox" role="switch" id="is_available"
                name="is_available" {% if product.is_available %}checked{% endif %}
                style="width: 40px; height: 20px; cursor: pointer;">
              <label class="form-check-label mb-0 ms-2" for="is_available" style="cursor: pointer;">Available for
                Sale</label>
            </div>
          </div>

          <div class="col-12 mt-5">
            <button type="submit" class="btn btn-dark w-100 py-3 text-uppercase"
              style="letter-spacing: 1px; font-weight: 500;">Update Product</button>
          </div>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock adminbodycontent %}
