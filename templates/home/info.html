{% load static %}

<style>
    .info-section {
        position: relative;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        padding: 120px 20px 80px 20px;
        overflow: hidden;
        color: #fff;
    }

    .hero-video {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
        z-index: 1;
    }

    .hero-bg-overlay {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        /* Dark gradient overlay to make text highly readable */
        background: linear-gradient(180deg, rgba(0, 0, 0, 0.3) 0%, rgba(0, 0, 0, 0.8) 100%);
        z-index: 2;
    }

    .content-wrapper {
        position: relative;
        z-index: 3;
        width: 100%;
        max-width: 1200px;
        margin: 0 auto;
    }

    .info-heading {
        font-family: 'Playfair Display', serif;
        font-size: 3.5rem;
        color: #ffffff;
        letter-spacing: -0.02em;
        margin-bottom: 24px;
        font-weight: 600;
        text-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
    }

    @media (max-width: 768px) {
        .info-heading {
            font-size: 2.5rem;
        }
    }

    .info-text {
        font-family: 'Outfit', sans-serif;
        color: #e0e0e0;
        font-size: 1.2rem;
        line-height: 1.8;
        max-width: 700px;
        margin: 0 auto;
        font-weight: 300;
        text-shadow: 0 2px 10px rgba(0, 0, 0, 0.5);
    }

    .category-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
        gap: 20px;
        margin-top: 80px;
    }

    /* Premium Glassmorphism Design */
    .category-item {
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px 12px;
        background: rgba(255, 255, 255, 0.05);
        /* very subtle white */
        backdrop-filter: blur(12px);
        /* Glassmorphism blur */
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.2);
        color: #ffffff;
        font-size: 0.85rem;
        font-family: 'Outfit', sans-serif;
        font-weight: 500;
        text-transform: uppercase;
        letter-spacing: 1.5px;
        text-decoration: none !important;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        border-radius: 4px;
        will-change: transform, background, border-color;
        transition: border-color 0.4s ease;
    }

    .category-item:hover {
        border-color: rgba(255, 255, 255, 0.8);
    }
</style>

<div class="info-section">
    <!-- Premium Stock Video Background -->
    <video class="hero-video" autoplay loop muted playsinline>
        <source src="/media/image/s.mp4" type="video/mp4">
    </video>
    <div class="hero-bg-overlay"></div>

    <div class="content-wrapper text-center">
        <h2 class="info-heading">Trendy Women's Clothing For All</h2>
        <p class="info-text">
            LUXE House Of Couture has one of the most exclusive trendy women’s clothing lines around. Feel happy,
            confident,
            and empowered every day with our chic and elegant collections.
        </p>

        <div class="category-grid">
            <a class="category-item" href="/category/cloth">Dresses</a>
            <a class="category-item" href="/category/tops">Tops</a>
            <a class="category-item" href="/category/tank">Tank Tops</a>
            <a class="category-item" href="/category/shirts">Blouses</a>
            <a class="category-item" href="/category/bottoms">Bottoms</a>
            <a class="category-item" href="/category/denim">Denim</a>
            <a class="category-item" href="/category/shorts">Shorts</a>
            <a class="category-item" href="/category/joggers">Joggers</a>
        </div>
    </div>
</div>

<script>
    document.addEventListener("DOMContentLoaded", () => {
        // GSAP Scroll Entrance Animations
        if (typeof gsap !== 'undefined' && typeof ScrollTrigger !== 'undefined') {
            gsap.registerPlugin(ScrollTrigger);

            gsap.fromTo(".info-heading",
                { opacity: 0, y: 50 },
                { opacity: 1, y: 0, duration: 1.2, ease: "power4.out", scrollTrigger: { trigger: ".info-section", start: "top 80%" } }
            );

            gsap.fromTo(".info-text",
                { opacity: 0, y: 40 },
                { opacity: 1, y: 0, duration: 1.2, delay: 0.15, ease: "power4.out", scrollTrigger: { trigger: ".info-section", start: "top 80%" } }
            );

            gsap.fromTo(".category-item",
                { opacity: 0, y: 40, scale: 0.95 },
                {
                    opacity: 1,
                    y: 0,
                    scale: 1,
                    duration: 0.8,
                    stagger: 0.08,
                    ease: "back.out(1.2)",
                    scrollTrigger: {
                        trigger: ".category-grid",
                        start: "top 85%"
                    }
                }
            );
        }

        // Framer Motion (Vanilla) Hover Interactions
        const MotionLib = window.Motion;
        if (MotionLib) {
            const { animate } = MotionLib;

            document.querySelectorAll('.category-item').forEach(item => {
                // Initial styling fix to prevent flicker during animation
                item.style.transformOrigin = "center center";

                item.addEventListener('mouseenter', () => {
                    animate(item, {
                        scale: 1.05,
                        y: -5,
                        backgroundColor: "rgba(255, 255, 255, 0.15)",
                        boxShadow: "0 15px 40px rgba(0,0,0,0.3)"
                    }, { duration: 0.4, easing: [0.22, 1, 0.36, 1] });
                });

                item.addEventListener('mouseleave', () => {
                    animate(item, {
                        scale: 1,
                        y: 0,
                        backgroundColor: "rgba(255, 255, 255, 0.05)",
                        boxShadow: "0 8px 32px rgba(0, 0, 0, 0.1)"
                    }, { duration: 0.5, easing: [0.22, 1, 0.36, 1] });
                });
            });
        }
    });
</script>
