{% extends 'base.html' %}
{% load static %}

{% block bodycontent %}
<div class="container my-5" style="min-height: 70vh; display: flex; align-items: center; justify-content: center;">
  <div class="text-center p-5 bg-white shadow-sm border" style="border-radius: 8px; max-width: 600px; width: 100%;">

    <div class="mb-4">
      <div class="d-inline-flex align-items-center justify-content-center bg-dark text-white rounded-circle mb-4"
        style="width: 80px; height: 80px;">
        <i class="bi bi-check-lg" style="font-size: 2.5rem;"></i>
      </div>
      <h1 class="fw-bold mb-3" style="font-family: 'Playfair Display', serif;">Thank you for your order!</h1>
      <p class="text-muted fs-5 mb-0">We have received your order details and will process it shortly.</p>
    </div>

    <hr class="my-4 border-secondary opacity-25">

    <p class="text-muted small mb-4">You will receive an email confirmation with tracking details once your item has
      shipped.</p>

    <a href="/" class="btn btn-dark px-5 py-3 rounded-0 text-uppercase"
      style="letter-spacing: 1px; font-weight: 500;">Continue Shopping</a>
  </div>
</div>
{% endblock bodycontent %}
