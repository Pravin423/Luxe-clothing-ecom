{% load static %}
<div class="container">
    <h2 class="section-title">Shop The Latest</h2>
    <div class="row g-4">
        {% if messages %}
        {% for message in messages %}
        <div class="alert alert-{{ message.tags|default:'info' }} alert-dismissible fade show" role="alert">
            {{ message }}
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>
        {% endfor %}
        {% endif %}

        {% for product in products %}
        <div class="col-lg-3 col-md-4 col-sm-6">
            <div class="custom-card">
                <div class="custom-card-img-wrapper">
                    <a href="{% url 'product_details' product.id %}" style="display: block; width: 100%; height: 100%;">
                        <img src="http://127.0.0.1:8000/admin/product/media/{{ product.image }}"
                            alt="{{ product.name }}">
                    </a>
                </div>
                <div class="details">
                    <h5 class="text-truncate" title="{{ product.name }}">{{ product.name }}</h5>
                    <div class="price-tag">&#8377;{{ product.price }}</div>
                    <p class="text-muted small mb-3">{{ product.category|title }}</p>
                    <div class="d-flex w-100 px-3 gap-2 mt-auto">
                        <a href="{% url 'product_details' product.id %}" class="btn btn-outline-dark w-50 rounded-0"
                            style="padding: 8px 0; font-size: 0.8rem; letter-spacing: 1px;">View</a>
                        <a href="/product/{{ product.id }}" class="btn btn-dark w-50 rounded-0"
                            style="padding: 8px 0; font-size: 0.8rem; letter-spacing: 1px;">Add</a>
                    </div>
                </div>
            </div>
        </div>
        {% endfor %}
    </div>
</div>
